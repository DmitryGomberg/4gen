<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4gen - hero</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat+Alternates:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="header__container">
      <div class="header__logo">
        <a href="">
          <img src="./images/logo.png" alt="Image">
        </a>
      </div>
      <nav class="header__nav">
        <ul>
          <li><a href="">Главная</a></li>
          <li><a href="">Цены</a></li>
          <li><a href="">Контакты</a></li>
          <li><a href="">Оферта</a></li>
        </ul>
      </nav>
      <div class="header__auth">
        <a href="" class="header__auth-link">Регистрация</a>
        <a href="" class="header__auth-link">Авторизация</a>
      </div>
      <div class="header__btn">
        <button class="btn">Начать бесплатно</button>
      </div>
    </div>
  </header>
  <main>
    <section class="hero">
      <div class="hero__container">
        <div class="hero__breadcrumbs">
          <ul>
            <li><a href="">Home</a></li>
            <li><a href="">Models</a></li>
            <li><a href="">Gemeni 3 Flash</a></li>
          </ul>
        </div>
        <div class="hero__main">
          <div class="hero__content">
            <ul class="hero__tags">
              <li class="hero__tag tag">
                <img src="images/tag1.svg" alt="Image">
                1M
              </li> 
              <li class="hero__tag tag">
                <img src="images/tag2.svg" alt="Image">
                0.65
              </li> 
              <li class="hero__tag tag">
                <img src="images/tag3.svg" alt="Image">
                3.9
              </li> 
              <li class="hero__tag tag">
                <img src="images/tag4.svg" alt="Image">
                Chat
              </li> 
              <li class="hero__tag tag">
                <img src="images/tag5.svg" alt="Image">
                Active
              </li> 
            </ul>
            <h1 class="hero__title"></h1>
            <p class="hero__description"></p>
            <div class="hero__button">
              <button class="btn">
                Попробовать бесплатно
                <img src="images/arrow-right.svg" alt="Image">
              </button>
            </div>
          </div>
          <div class="hero__expample">
            <img src="/images/code.png" alt="Image">
          </div>
        </div>
      </div>
    </section>
  </main>
  <footer></footer>
</body>
</html>
